<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Watch Party - Offline</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #0a0f18;
        color: #e2e8f0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
      }
      .card {
        background: rgba(255, 255, 255, 0.05);
        padding: 40px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        max-width: 400px;
      }
      h1 { color: #00f0ff; margin-top: 0; }
      p { color: #a0aec0; }
      .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 20px;
        background: #00f0ff;
        color: #000;
        text-decoration: none;
        border-radius: 6px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>Watch Party requires an active internet connection to synchronize playback with others.</p>
      <a href="/watch-party/" class="btn">Try Again</a>
    </div>
  </body>
</html>
